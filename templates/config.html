{% extends "base.html" %}

{% block content %}
    <h1>Configuración del Sistema</h1>
    
    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}
    
    <form method="post">
        <div class="section">
            <h2>🌍 AEMET</h2>
            <label>
                API key:
                <input type="text" name="api" value="{{ config.AEMET.api or '' }}" placeholder="Introduce la API key de AEMET">
            </label>
        </div>
        
        <div class="section">
            <h2>🔥 EGIF</h2>
            <div class="checkbox">
                <input type="checkbox" id="activo" name="activo" {% if config.EGIF.activo %}checked{% endif %}>
                <label for="activo">Habilitar módulo EGIF</label>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <label>
                    Año inicio:
                    <input type="number" name="anio_inicio" value="{{ config.EGIF.anio_inicio }}" min="2000" max="2100">
                </label>
                <label>
                    Año fin:
                    <input type="number" name="anio_fin" value="{{ config.EGIF.anio_fin }}" min="2000" max="2100">
                </label>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <label>
                    Comunidad Autónoma:
                    <input type="text" name="ComunidadAutonoma" value="{{ config.EGIF.ComunidadAutonoma or '' }}" placeholder="Opcional">
                </label>
                <label>
                    Provincia:
                    <input type="text" name="Provincia" value="{{ config.EGIF.Provincia or '' }}" placeholder="Opcional">
                </label>
                <label>
                    Municipio:
                    <input type="text" name="Municipio" value="{{ config.EGIF.Municipio or '' }}" placeholder="Opcional">
                </label>
                <label>
                    Comarca / Isla:
                    <input type="text" name="ComarcaIsla" value="{{ config.EGIF.ComarcaIsla or '' }}" placeholder="Opcional">
                </label>
            </div>

            <div class="checkbox" style="margin-top: 1rem;">
                <input type="checkbox" id="borrarDirectorio" name="borrarDirectorio" {% if config.EGIF.borrarDirectorio %}checked{% endif %}>
                <label for="borrarDirectorio">Borrar directorio antes de descargar nuevos datos</label>
            </div>
            
            <h3 style="margin-top: 1.5rem; font-size: 1.1rem;">Nombres de Archivos</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                <label>
                    ZIP:
                    <input type="text" name="nameZip" value="{{ config.EGIF.nameZip or '' }}">
                </label>
                <label>
                    CSV:
                    <input type="text" name="nameCSV" value="{{ config.EGIF.nameCSV or '' }}">
                </label>
                <label>
                    JSON:
                    <input type="text" name="nameJson" value="{{ config.EGIF.nameJson or '' }}">
                </label>
            </div>
        </div>
        
        <div style="text-align: right;">
            <button type="submit">💾 Guardar Configuración</button>
        </div>
    </form>
{% endblock %}
