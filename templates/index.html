<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prevención de Incendios</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 24px; background: #f4f4f4; }
        .container { max-width: 720px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 0 16px rgba(0,0,0,0.08); }
        button, input[type=submit] { padding: 12px 20px; font-size: 1rem; margin-top: 12px; }
        .message { margin: 16px 0; padding: 12px; background: #e0f7da; border: 1px solid #8bc34a; color: #33691e; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Prevención de Incendios</h1>
    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}
    <p>Use los botones para iniciar el proceso o editar los ajustes.</p>
    <form action="{{ url_for('start') }}" method="post">
        <button type="submit">Iniciar proceso</button>
    </form>
    <p>Estado del proceso: <strong>{{ 'En ejecución' if running else 'Detenido' }}</strong></p>
    <p><a href="{{ url_for('config') }}">Ir a configuración</a></p>
</div>
</body>
</html>
